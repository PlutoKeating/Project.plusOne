<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加一的 Agent 成长之路 — 从零开始的 AI 应用开发路线图</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #4A90D9;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* 移动端侧边栏优化 */
    .sidebar { width: 18rem; transition: transform 0.25s ease-out; }
    .app-name-link { font-size: 1.1rem !important; font-weight: 700; }
    .sidebar-nav li { font-size: 0.9rem; }
    .markdown-section { max-width: 900px; padding-top: 20px; }
    
    /* 优化移动端点击区域 */
    @media screen and (max-width: 768px) {
      .sidebar-nav li a {
        padding: 10px 15px;
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🤖 加一的 Agent 成长之路',
      repo: 'https://github.com/PlutoKeating/Project.plusOne',
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true, // 移动端合并导航栏
      coverpage: true,
      maxLevel: 3,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#4A90D9',
      search: {
        placeholder: '搜索文档...',
        noData: '没有结果',
        depth: 4,
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      formatUpdated: '{YYYY}-{MM}-{DD}',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
