<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加一的 Agent 成长之路 — 从零开始的 AI 应用开发路线图</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #4A90D9;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* 移动端侧边栏优化 */
    .sidebar { width: 18rem; transition: transform 0.25s ease-out; }
    .app-name-link { font-size: 1.1rem !important; font-weight: 700; }
    .sidebar-nav li { font-size: 0.9rem; }
    .markdown-section { max-width: 900px; padding-top: 20px; }
    
    /* 优化移动端点击区域 */
    @media screen and (max-width: 768px) {
      .sidebar-nav li a {
        padding: 10px 15px;
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🤖 加一的 Agent 成长之路',
      repo: 'https://github.com/PlutoKeating/Project.plusOne',
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true, // 移动端合并导航栏
      coverpage: true,
      maxLevel: 3,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#4A90D9',
      search: {
        placeholder: '搜索文档...',
        noData: '没有结果',
        depth: 4,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      formatUpdated: '{YYYY}-{MM}-{DD}',
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            var githubRepo = 'https://github.com/PlutoKeating/Project.plusOne';
            var issuesUrl = githubRepo + '/issues';
            var footer = [
              '<hr/>',
              '<div style="text-align: center; margin-top: 2rem; padding: 1rem; background-color: #f8f9fa; border-radius: 8px;">',
              '  <p style="margin-bottom: 1rem; font-weight: bold; color: #333;">如果发现内容有误，欢迎反馈：</p>',
              '  <a href="' + githubRepo + '" target="_blank" style="display: inline-block; padding: 8px 16px; margin: 0 10px; background: #4A90D9; color: #fff; border-radius: 4px; text-decoration: none; font-weight: bold;">🐙 GitHub 源码</a>',
              '  <a href="' + issuesUrl + '" target="_blank" style="display: inline-block; padding: 8px 16px; margin: 0 10px; background: #e05d44; color: #fff; border-radius: 4px; text-decoration: none; font-weight: bold;">🐛 提交 Issues 报错</a>',
              '</div>',
              '<div style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9em;">',
              '  <p>PlutoKeating版权所有，使用AI生成 | <a href="#/liability" style="color: #4A90D9;">⚖️ 版权与责任控制声明</a></p>',
              '</div>'
            ].join('');
            next(html + footer);
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
