<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加一的 Agent 成长之路 — 从零开始的 AI 应用开发路线图</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <style>
    :root {
      --theme-color: #4A90D9;
    }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* 移动端侧边栏优化 */
    .sidebar { width: 18rem; transition: transform 0.25s ease-out; }
    .app-name-link { font-size: 1.1rem !important; font-weight: 700; }
    .sidebar-nav li { font-size: 0.9rem; }
    .markdown-section { max-width: 900px; padding-top: 20px; }
    
    /* 优化移动端点击区域 */
    @media screen and (max-width: 768px) {
      .sidebar-nav li a {
        padding: 10px 15px;
        line-height: 1.5;
      }
    }
    
    /* 底部反馈按钮组件样式 */
    .footer-feedback {
      text-align: center; margin-top: 2rem; padding: 1.5rem; background-color: #f8f9fa; border-radius: 8px;
    }
    .footer-feedback p {
      margin-bottom: 1.2rem; font-weight: bold; color: #333;
    }
    .feedback-btn-group {
      display: flex; justify-content: center; gap: 20px;
    }
    .feedback-btn {
      display: inline-block; padding: 10px 20px; color: #fff !important; border-radius: 6px; text-decoration: none !important; font-weight: bold; text-align: center; transition: opacity 0.2s;
    }
    .feedback-btn:hover {
      opacity: 0.8; color: #fff !important;
    }
    .btn-github { background: #4A90D9; }
    .btn-issues { background: #e05d44; }

    @media screen and (max-width: 768px) {
      .feedback-btn-group {
        flex-direction: column; gap: 12px;
      }
      .feedback-btn {
        width: 100%; box-sizing: border-box;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '🤖 加一的 Agent 成长之路',
      repo: 'https://github.com/PlutoKeating/Project.plusOne',
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true, // 移动端合并导航栏
      coverpage: true,
      maxLevel: 3,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#4A90D9',
      search: {
        placeholder: '搜索文档...',
        noData: '没有结果',
        depth: 4,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      formatUpdated: '{YYYY}-{MM}-{DD}',
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            var githubRepo = 'https://github.com/PlutoKeating/Project.plusOne';
            var issuesUrl = githubRepo + '/issues';
            var footer = [
              '<hr/>',
              '<div class="footer-feedback">',
              '  <p>如果发现内容有误，欢迎反馈：</p>',
              '  <div class="feedback-btn-group">',
              '    <a href="' + githubRepo + '" target="_blank" class="feedback-btn btn-github">🐙 GitHub 源码</a>',
              '    <a href="' + issuesUrl + '" target="_blank" class="feedback-btn btn-issues">🐛 提交 Issues 报错</a>',
              '  </div>',
              '</div>',
              '<div style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9em;">',
              '  <p>PlutoKeating版权所有，使用AI生成 | <a href="#/liability" style="color: #4A90D9;">⚖️ 版权与责任控制声明</a></p>',
              '</div>'
            ].join('');
            next(html + footer);
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
